name: Unity Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read

concurrency:
  group: unity-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.testMode }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - EditMode
          - PlayMode

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.testMode }}-
            Library-

      - name: Run ${{ matrix.testMode }} tests
        id: tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.62f1
          testMode: ${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: ${{ matrix.testMode }} test results
          artifactsPath: ${{ matrix.testMode }}-artifacts
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+CorgiCommando,+CorgiCommando.*,-CorgiCommando.Tests.*'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.testMode }}-results
          path: ${{ steps.tests.outputs.artifactsPath }}

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.testMode }}-coverage
          path: ${{ steps.tests.outputs.coveragePath }}

  ios-build:
    name: iOS build (Xcode project)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-iOS-
            Library-

      - name: Check Unity license secrets
        id: license-check
        shell: bash
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        run: |
          if [[ -n "$UNITY_LICENSE" || ( -n "$UNITY_EMAIL" && -n "$UNITY_PASSWORD" && -n "$UNITY_SERIAL" ) ]]; then
            echo "has_license=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Skipping iOS build: missing Unity license secrets. Configure UNITY_LICENSE or UNITY_EMAIL + UNITY_PASSWORD + UNITY_SERIAL."
            echo "has_license=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build iOS Xcode project (no signing)
        id: ios-build
        if: steps.license-check.outputs.has_license == 'true'
        continue-on-error: true
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: 2022.3.62f1
          targetPlatform: iOS
          buildsPath: build
          customParameters: -allowDebugging

      # Unity Personal licenses may not include the iOS module. Keep this non-blocking until upgraded.
      # Set repository variable UNITY_IOS_LICENSED=true once an iOS-capable license is configured to hard-gate failures.
      - name: Warn when iOS build fails in non-gating mode
        if: steps.license-check.outputs.has_license == 'true' && steps.ios-build.outcome == 'failure' && vars.UNITY_IOS_LICENSED != 'true'
        run: echo "::warning::iOS build failed, but UNITY_IOS_LICENSED is not true. Treating as non-blocking until an iOS-capable Unity license is configured."

      - name: Enforce iOS build when license is iOS-capable
        if: steps.license-check.outputs.has_license == 'true' && steps.ios-build.outcome == 'failure' && vars.UNITY_IOS_LICENSED == 'true'
        run: |
          echo "::error::iOS build failed with UNITY_IOS_LICENSED=true. This is now a required CI gate."
          exit 1

      - name: Upload iOS Xcode project
        if: steps.license-check.outputs.has_license == 'true' && steps.ios-build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcode-project
          path: build/iOS
